name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write NASA_API_KEY to local.properties
        run: echo "NASA_API_KEY=${{ secrets.NASA_API_KEY }}" >> local.properties

      - name: Run lint
        run: ./gradlew lintDevDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-devDebug.html

  # ── 2. Unit tests ───────────────────────────────────────────────────────────
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write NASA_API_KEY to local.properties
        run: echo "NASA_API_KEY=${{ secrets.NASA_API_KEY }}" >> local.properties

      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

  # ── 3. Debug build ──────────────────────────────────────────────────────────
  build_debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write NASA_API_KEY to local.properties
        run: echo "NASA_API_KEY=${{ secrets.NASA_API_KEY }}" >> local.properties

      - name: Assemble debug APK
        run: ./gradlew assembleProdDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmica-debug
          path: app/build/outputs/apk/prod/debug/*.apk

  # ── 4. Release build (main branch only) ────────────────────────────────────
  build_release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build_debug
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write NASA_API_KEY to local.properties
        run: echo "NASA_API_KEY=${{ secrets.NASA_API_KEY }}" >> local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > cosmica-release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/cosmica-release.jks
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleProdRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmica-release
          path: app/build/outputs/apk/prod/release/*.apk
