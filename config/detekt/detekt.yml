build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false

complexity:
  active: true
  ComplexCondition:
    threshold: 4
  LongMethod:
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
    ignoreDefaultParameters: true
  TooManyFunctions:
    thresholdInClasses: 15
    thresholdInFiles: 20

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false  # we catch Exception in paging sources intentionally

formatting:
  active: true
  android: true
  autoCorrect: true
  MaximumLineLength:
    active: true
    maxLineLength: 120

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated: ['Composable']
  VariableNaming:
    active: true

performance:
  active: true

potential-bugs:
  active: true
  DontDowncastCollectionTypes:
    active: true

style:
  active: true
  ForbiddenComment:
    active: false
  MagicNumber:
    active: true
    ignoreAnnotated:
      - 'Composable'
      - 'Preview'
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
  UnusedPrivateMember:
    active: true
  WildcardImport:
    active: true
    excludeImports: []
